version: '3'

vars:
  IDF_PATH: ~/esp/esp-idf-v5.3
  HW_DIR: m5paper_hw
  PORT: /dev/cu.usbmodem101
  IDF_PYTHON: ~/.espressif/python_env/idf5.3_py3.11_env/bin/python

tasks:
  build:
    desc: Build the M5Paper firmware
    dir: "{{.HW_DIR}}"
    cmds:
      - bash -c 'export IDF_PATH={{.IDF_PATH}} && {{.IDF_PYTHON}} {{.IDF_PATH}}/tools/idf.py build'

  flash:
    desc: Flash firmware to M5Paper
    dir: "{{.HW_DIR}}"
    cmds:
      - bash -c 'export IDF_PATH={{.IDF_PATH}} && {{.IDF_PYTHON}} {{.IDF_PATH}}/tools/idf.py -p {{.PORT}} flash'

  monitor:
    desc: Open serial monitor
    dir: "{{.HW_DIR}}"
    cmds:
      - bash -c 'export IDF_PATH={{.IDF_PATH}} && {{.IDF_PYTHON}} {{.IDF_PATH}}/tools/idf.py -p {{.PORT}} monitor'

  flash-monitor:
    desc: Build, flash, and open serial monitor
    dir: "{{.HW_DIR}}"
    cmds:
      - bash -c 'export IDF_PATH={{.IDF_PATH}} && {{.IDF_PYTHON}} {{.IDF_PATH}}/tools/idf.py -p {{.PORT}} flash monitor'

  menuconfig:
    desc: Open ESP-IDF menuconfig
    dir: "{{.HW_DIR}}"
    cmds:
      - bash -c 'export IDF_PATH={{.IDF_PATH}} && {{.IDF_PYTHON}} {{.IDF_PATH}}/tools/idf.py menuconfig'

  backend:
    desc: Start the backend server on port 8090
    dir: backend
    cmds:
      - .venv/bin/uvicorn main:app --host 0.0.0.0 --port 8090 --reload

  clean:
    desc: Clean build artifacts
    dir: "{{.HW_DIR}}"
    cmds:
      - bash -c 'export IDF_PATH={{.IDF_PATH}} && {{.IDF_PYTHON}} {{.IDF_PATH}}/tools/idf.py fullclean'
